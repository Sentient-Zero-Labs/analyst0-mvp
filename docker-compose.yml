version: '3.8'

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: nginx:v1.0
    container_name: nginx_server
    ports:
      - "3077:80"
    environment:
      - NGINX_SERVER_PORT=80
      - FRONTEND_SERVER_NAME=dev.analyst0.com
      - FRONTEND_HOST=http://host.docker.internal
      - FRONTEND_PORT=3000
      - API_SERVER_NAME=dev-api.analyst0.com
      - API_HOST=http://host.docker.internal
      - API_PORT=8000
    restart: always

  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: timescaledb
    environment:
      - PGHOST=host.docker.internal
      - POSTGRES_USER=your_user
      - POSTGRES_PASSWORD=your_password
      - POSTGRES_DB=your_database
    restart: always

  frontend:
    build:
      context: ./analyst-ui
      dockerfile: Dockerfile
    image: analyst-ui:v1.0
    container_name: analyst-ui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always

  backend:
    build:
      context: ./ai-backend
      dockerfile: Dockerfile
    image: ai-backend:v1.0
    container_name: ai-backend
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      - timescaledb
