version: '3.8'

services:
  database-microservice:
    build: .
    ports:
      - "8000:8000"
    environment:
      - API_KEY=test-api-key-12345
      - LOG_LEVEL=INFO
      - DEBUG=true
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - mysql
    networks:
      - db-network

  # Test databases for development
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - db-network

volumes:
  postgres_data:
  mysql_data:

networks:
  db-network:
    driver: bridge
